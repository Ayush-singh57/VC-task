version: '3.8'

services:
  # The 'A' and 'P' in LAMP (Apache + PHP)
  web-server:
    build: ./php-app
    container_name: lamp_web
    restart: always
    ports:
      - "8080:80"  # Mapping to 8080 to avoid React's port
    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: lamp_db
    restart: always
    environment:
      MYSQL_DATABASE: lamp_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"  
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: