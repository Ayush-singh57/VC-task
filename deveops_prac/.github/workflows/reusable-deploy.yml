name: Blueprint - Build & Deploy

on:
  workflow_call:
    inputs:
      environment-name:
        description: 'The name of the environment (e.g., Staging or Production)'
        required: true
        type: string
      s3-bucket:
        description: 'The destination AWS S3 bucket name'
        required: true
        type: string

jobs:
  build-and-deploy:
    
    name: Deploy to ${{ inputs.environment-name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'ap-south-1'  

      - name: Sync to AWS S3
     
        run: aws s3 sync build/ s3://${{ inputs.s3-bucket }} --delete